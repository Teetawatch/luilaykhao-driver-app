name: driver_app
description: "Luilaykhao Driver App - Real-time van tracking for drivers"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  flutter_map_animations: ^0.9.0
  geolocator: ^14.0.2
  google_fonts: ^6.2.1
  http: ^1.6.0
  intl: ^0.20.2
  latlong2: ^0.9.1
  mobile_scanner: ^7.1.3
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  image_path: "logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
